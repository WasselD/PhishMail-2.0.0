<div dir="ltr" style="background-color: #f9f9f9; padding: 20px 0;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 450px; margin: 0 auto; background: #ffffff; border: 1px solid #e1e1e1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <tbody>
	<tr>
		<td style="padding: 20px 20px 10px 20px; text-align: left;">
			<img src="https://www.vectorlogo.zone/logos/instagram/instagram-wordmark.svg" 
				alt="Instagram" 
				height="30" 
				style="display: block; border: 0;">
		</td>
	</tr>
      
      <tr>
        <td style="padding: 0 20px;">
          <hr style="border: 0; border-top: 1px solid #efefef; margin: 0;">
        </td>
      </tr>

      <tr>
        <td style="padding: 30px 20px; color: #262626; font-size: 16px; line-height: 1.5;">
          <p style="margin: 0 0 15px 0; font-weight: 600;">Hi {{ name }},</p>
          <p style="margin: 0 0 15px 0;">Someone tried to log in to your Instagram account <strong>{{ username }}</strong>.</p>
          <p style="margin: 0 0 15px 0;">If this was you, use the code below to log in:</p>
          
          <div style="background: #fafafa; border: 1px solid #dbdbdb; border-radius: 4px; padding: 15px; text-align: center; margin: 20px 0;">
            <span id="security-code" style="font-size: 32px; font-weight: 700; letter-spacing: 5px; color: #0095f6;">000000</span>
          </div>

          <p style="margin: 0;">If this wasn't you, <a href="{{ link }}" style="color: #0095f6; text-decoration: none; font-weight: 600;">reset your password</a> to secure your account.</p>
        </td>
      </tr>

      <tr>
        <td style="padding: 20px; background: #f9f9f9; color: #8e8e8e; font-size: 12px; text-align: center;">
          <p style="margin: 0 0 5px 0;">© Instagram, Menlo Park, CA 94022</p>
          <p style="margin: 0;">Sent to {{ email }}. <a href="#" style="color: #8e8e8e; text-decoration: underline;">Remove email</a> from this account.</p>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>  
(function() {
    const randomCode = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('security-code').textContent = randomCode;})();
</script>
